name: Staging CI/CD

# Deploy on push to staging. PRs trigger the workflow but the deploy job is
# gated off (see `if:` below), so PRs never deploy.
on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------------
  # CD: deploy to staging (not on PRs)
  # ----------------------------------------------------------------------
  deploy:
    name: Deploy to OVH Staging
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: staging-script
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to OVH Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_SSH_USER }}
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          script: |
            set -e
            echo "Starting STAGING deployment..."

            APP_PATH="/var/www/staging-script"

            # ==========================
            # FIRST-TIME CLONE
            # ==========================
            if [ ! -d "$APP_PATH/.git" ]; then
              rm -rf $APP_PATH
              git clone -b staging https://${{ secrets.PAT_TOKEN }}@github.com/rp-vespera/script-replica.git $APP_PATH
            fi

            cd $APP_PATH

            # Trust this path even if .git is owned by a different user (e.g. the
            # web user touched files at runtime) — avoids git "dubious ownership".
            git config --global --add safe.directory "$APP_PATH"

            git remote set-url origin https://${{ secrets.PAT_TOKEN }}@github.com/rp-vespera/script-replica.git || true

            # ==========================
            # SAFE GIT SYNC
            # ==========================
            echo "Syncing staging branch safely..."

            mv .env .env.backup 2>/dev/null || true
            git fetch origin staging
            git checkout staging 2>/dev/null || git checkout -b staging origin/staging
            # Hard reset to the remote tip. Works even when the local checkout
            # has UNRELATED history (e.g. it was previously pointed at a
            # different repo), and discards any tracked-file edits the /scripts
            # dashboard made at runtime so the sync never blocks. Git is the
            # source of truth for tracked files; untracked runtime files survive
            # via the git clean excludes below.
            git reset --hard origin/staging
            mv .env.backup .env 2>/dev/null || true

            git clean -fd -e .env -e storage -e bootstrap/cache -e scripts/done -e scripts/failed

            # ==========================
            # INSTALL DEPENDENCIES
            # ==========================
            echo "Installing dependencies..."
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            # ==========================
            # ENV SETUP (app config only)
            # ==========================
            echo "Preparing environment..."

            if [ ! -f .env ]; then
              touch .env
            fi

            export APP_URL="${{ secrets.APP_URL }}"

            grep -q "^APP_ENV=" .env \
              && sed -i "s|^APP_ENV=.*|APP_ENV=staging|" .env \
              || echo "APP_ENV=staging" >> .env

            grep -q "^APP_DEBUG=" .env \
              && sed -i "s|^APP_DEBUG=.*|APP_DEBUG=false|" .env \
              || echo "APP_DEBUG=false" >> .env

            grep -q "^APP_URL=" .env \
              && sed -i "s|^APP_URL=.*|APP_URL=${APP_URL}|" .env \
              || echo "APP_URL=${APP_URL}" >> .env

            # ==========================
            # DATABASE (MySQL) CONFIG
            # ==========================
            echo "Writing database config..."

            # DB1 — primary (DVC)
            export DB_HOST="${{ secrets.APP_HOST }}"
            export DB_PORT="${{ secrets.APP_PORT }}"          # APP_PORT var holds 3306
            export DB_DATABASE="${{ secrets.DVC_DB_NAME }}"
            export DB_USERNAME="${{ secrets.DVC_DB_USERNAME }}"
            export DB_PASSWORD="${{ secrets.DVC_DB_PASSWORD }}"

            # DB2 — secondary (SAS SAERPRP)
            export DB2_HOST="${{ secrets.SAS_DB_HOST }}"
            export DB2_PORT="${{ secrets.SAS_DB_PORT }}"
            export DB2_DATABASE="${{ secrets.SAS_DB_SAERPRP_NAME }}"
            export DB2_USERNAME="${{ secrets.SAS_DB_USERNAME }}"
            export DB2_PASSWORD="${{ secrets.SAS_DB_PASSWORD }}"

            # DB1
            grep -q "^DB_CONNECTION=" .env \
              && sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=mysql|" .env \
              || echo "DB_CONNECTION=mysql" >> .env

            grep -q "^DB_HOST=" .env \
              && sed -i "s|^DB_HOST=.*|DB_HOST=${DB_HOST}|" .env \
              || echo "DB_HOST=${DB_HOST}" >> .env

            grep -q "^DB_PORT=" .env \
              && sed -i "s|^DB_PORT=.*|DB_PORT=${DB_PORT}|" .env \
              || echo "DB_PORT=${DB_PORT}" >> .env

            grep -q "^DB_DATABASE=" .env \
              && sed -i "s|^DB_DATABASE=.*|DB_DATABASE=${DB_DATABASE}|" .env \
              || echo "DB_DATABASE=${DB_DATABASE}" >> .env

            grep -q "^DB_USERNAME=" .env \
              && sed -i "s|^DB_USERNAME=.*|DB_USERNAME=${DB_USERNAME}|" .env \
              || echo "DB_USERNAME=${DB_USERNAME}" >> .env

            grep -q "^DB_PASSWORD=" .env \
              && sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=\"${DB_PASSWORD}\"|" .env \
              || echo "DB_PASSWORD=\"${DB_PASSWORD}\"" >> .env

            # DB2
            grep -q "^DB2_HOST=" .env \
              && sed -i "s|^DB2_HOST=.*|DB2_HOST=${DB2_HOST}|" .env \
              || echo "DB2_HOST=${DB2_HOST}" >> .env

            grep -q "^DB2_PORT=" .env \
              && sed -i "s|^DB2_PORT=.*|DB2_PORT=${DB2_PORT}|" .env \
              || echo "DB2_PORT=${DB2_PORT}" >> .env

            grep -q "^DB2_DATABASE=" .env \
              && sed -i "s|^DB2_DATABASE=.*|DB2_DATABASE=${DB2_DATABASE}|" .env \
              || echo "DB2_DATABASE=${DB2_DATABASE}" >> .env

            grep -q "^DB2_USERNAME=" .env \
              && sed -i "s|^DB2_USERNAME=.*|DB2_USERNAME=${DB2_USERNAME}|" .env \
              || echo "DB2_USERNAME=${DB2_USERNAME}" >> .env

            grep -q "^DB2_PASSWORD=" .env \
              && sed -i "s|^DB2_PASSWORD=.*|DB2_PASSWORD=\"${DB2_PASSWORD}\"|" .env \
              || echo "DB2_PASSWORD=\"${DB2_PASSWORD}\"" >> .env

            # ==========================
            # APP KEY
            # ==========================
            echo "Ensuring APP_KEY exists..."
            if ! grep -q "^APP_KEY=base64:" .env; then
              php artisan key:generate --force
            fi

            # ==========================
            # CACHE FIX (IMPORTANT)
            # ==========================
            echo "Refreshing Laravel config..."

            php artisan config:clear
            php artisan cache:clear
            php artisan config:cache

            # ==========================
            # DATABASE MIGRATIONS
            # ==========================
            echo "Running migrations..."
            php artisan migrate --force

            # ==========================
            # SCRIPT FOLDER PERMISSIONS
            # ==========================
            # Make the script folders writable so both the deploy and the web
            # user (the /scripts dashboard) can move files between pending/,
            # done/ and failed/.
            echo "Preparing script folders..."
            chmod -R 0777 scripts/pending scripts/done scripts/failed 2>/dev/null || true

            # ==========================
            # RUN PENDING ONE-OFF SCRIPTS
            # ==========================
            # Execute everything in scripts/pending/, file each to done/ (success)
            # or failed/ (failure), and record the outcome in script_runs.
            # Idempotent: a script that already succeeded is filed without
            # re-running, and a single failing script does not abort the deploy.
            echo "Running pending one-off scripts..."
            php artisan scripts:run-pending

            # ==========================
            # FINAL STEPS
            # ==========================
            php artisan route:cache
            php artisan view:cache

            echo "STAGING deployment finished successfully!"

      # TEMP DIAGNOSTIC — remove once the /scripts/review/approve 500 is solved.
      # Prints the Laravel log + script_runs schema into THIS Actions run output,
      # so you can read the 500's stack trace without SSH/OVH access.
      - name: Show Laravel log & DB schema (debug)
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_SSH_USER }}
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          script: |
            cd /var/www/staging-script
            echo "===== migration status ====="
            php artisan migrate:status 2>&1 | tail -n 20 || echo "(migrate:status failed)"
            echo "===== script_runs columns ====="
            php artisan tinker --execute="echo implode(', ', Schema::getColumnListing('script_runs'));" 2>&1 || echo "(could not read script_runs schema — table may not exist)"
            echo "===== storage/logs/laravel.log (last 150 lines) ====="
            tail -n 150 storage/logs/laravel.log 2>/dev/null || echo "(no laravel.log)"
